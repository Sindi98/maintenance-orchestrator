apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-orchestrator
  namespace: maintenance-orchestrator-system
  labels:
    app.kubernetes.io/name: maintenance-orchestrator
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: maintenance-orchestrator
spec:
  # Single active instance is guaranteed by leader election; raise to 2 for
  # standby HA (only the leader reconciles, so global concurrency is preserved).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: maintenance-orchestrator
      app.kubernetes.io/component: controller
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maintenance-orchestrator
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: maintenance-orchestrator
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: maintenance-orchestrator
      terminationGracePeriodSeconds: 30
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: maintenance-orchestrator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/maintenance-orchestrator/config.yaml
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/maintenance-orchestrator
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: maintenance-orchestrator-config
        - name: tmp
          emptyDir: {}

