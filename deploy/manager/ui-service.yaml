apiVersion: v1
kind: Service
metadata:
  name: maintenance-orchestrator-ui
  namespace: maintenance-orchestrator-system
  labels:
    app.kubernetes.io/name: maintenance-orchestrator
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: maintenance-orchestrator
spec:
  # ClusterIP only: the dashboard has no authentication. Reach it with
  #   kubectl -n maintenance-orchestrator-system port-forward svc/maintenance-orchestrator-ui 8082:8082
  # or place it behind an authenticating ingress/route.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: maintenance-orchestrator
    app.kubernetes.io/component: controller
  ports:
    - name: ui
      port: 8082
      targetPort: ui
      protocol: TCP
