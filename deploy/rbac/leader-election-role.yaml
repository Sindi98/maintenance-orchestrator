# Namespaced permissions for controller-runtime leader election (Lease-based) and
# Event emission. Granted only within the controller's own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maintenance-orchestrator-leader-election
  namespace: maintenance-orchestrator-system
  labels:
    app.kubernetes.io/name: maintenance-orchestrator
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: maintenance-orchestrator
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

