---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: maintenancepolicies.maintenance.platform.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
spec:
  group: maintenance.platform.dev
  names:
    kind: MaintenancePolicy
    listKind: MaintenancePolicyList
    plural: maintenancepolicies
    singular: maintenancepolicy
    shortNames:
      - mpol
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: ProtectCP
          type: boolean
          jsonPath: .spec.protectControlPlane
        - name: MaxConcurrent
          type: integer
          jsonPath: .spec.maxConcurrentDrains
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: MaintenancePolicy holds cluster-wide guardrails for maintenance operations.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: MaintenancePolicySpec defines cluster-wide guardrails applied to every MaintenanceRequest that references this policy (or the default policy).
              type: object
              properties:
                protectControlPlane:
                  description: ProtectControlPlane forbids draining control-plane nodes unless a request opts in and the policy permits it.
                  type: boolean
                  default: true
                controlPlaneNodeLabels:
                  description: ControlPlaneNodeLabels are the label keys that identify control-plane nodes.
                  type: array
                  default:
                    - node-role.kubernetes.io/control-plane
                    - node-role.kubernetes.io/master
                  items:
                    type: string
                maxConcurrentDrains:
                  description: MaxConcurrentDrains caps how many nodes a single MaintenanceRequest may drain at once (its effective per-request concurrency is the minimum of this and the request's spec.maxConcurrent). It is enforced per request, not summed across concurrently-running requests; use MaxUnavailableNodes / MaxUnavailablePercent to bound cluster-wide blast radius across requests.
                  type: integer
                  format: int32
                  default: 1
                  minimum: 1
                maxUnavailableNodes:
                  description: MaxUnavailableNodes caps how many matched nodes may be unschedulable at once. Zero disables the absolute cap.
                  type: integer
                  format: int32
                  minimum: 0
                maxUnavailablePercent:
                  description: MaxUnavailablePercent caps unavailable matched nodes as a percentage. Zero disables the percentage cap.
                  type: integer
                  format: int32
                  minimum: 0
                  maximum: 100
                reservedNodeLabels:
                  description: ReservedNodeLabels block any node carrying one of these label keys.
                  type: array
                  items:
                    type: string
                reservedTaints:
                  description: ReservedTaints block any node carrying one of these taint keys.
                  type: array
                  items:
                    type: string
                minCapacityHeadroomPercent:
                  description: MinCapacityHeadroomPercent is the minimum request-based headroom that must remain after a node is removed. Zero disables the heuristic capacity check.
                  type: integer
                  format: int32
                  minimum: 0
                  maximum: 100
                allowForceEviction:
                  description: AllowForceEviction permits deletion-based eviction when a request also sets Force. Off by default.
                  type: boolean
                  default: false
                allowNodeReplacement:
                  description: AllowNodeReplacement permits requests with spec.upgrade to delete a node's backing Machine after draining. Off by default.
                  type: boolean
                  default: false
                defaultApprovalPolicy:
                  description: DefaultApprovalPolicy is applied to requests that do not specify one.
                  type: string
                  default: AutoApprove
                  enum:
                    - AutoApprove
                    - ManualBeforeDrain
                    - ManualBeforeUncordon
                    - ManualBeforeBoth
                allowedWindows:
                  description: AllowedWindows restricts mutation to these recurring windows when set.
                  type: array
                  items:
                    type: object
                    required:
                      - cron
                      - duration
                    properties:
                      cron:
                        description: Cron is a 5-field cron expression marking the START of the window.
                        type: string
                      duration:
                        description: Duration is how long the window stays open after each start.
                        type: string
                      timeZone:
                        description: TimeZone is an IANA name (e.g. "Europe/Rome"); empty means UTC.
                        type: string
                failureThreshold:
                  description: FailureThreshold is the number of node failures that aborts a request.
                  type: integer
                  format: int32
                  default: 1
                  minimum: 1
                nodeSelector:
                  description: NodeSelector limits the scope of this policy to matching nodes; empty means cluster-wide.
                  type: object
                  properties:
                    matchExpressions:
                      type: array
                      items:
                        type: object
                        required:
                          - key
                          - operator
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          values:
                            type: array
                            items:
                              type: string
                            x-kubernetes-list-type: atomic
                      x-kubernetes-list-type: atomic
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                  x-kubernetes-map-type: atomic
            status:
              description: MaintenancePolicyStatus is the observed state of a MaintenancePolicy.
              type: object
              properties:
                conditions:
                  description: Conditions report validation and readiness of the policy.
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  type: integer
                  format: int64
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []

