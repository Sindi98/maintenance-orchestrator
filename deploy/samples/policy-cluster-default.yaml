# Default cluster guardrails. The controller uses the policy named by
# config.defaultPolicyName ("cluster-default") for requests without a policyRef.
apiVersion: maintenance.platform.dev/v1alpha1
kind: MaintenancePolicy
metadata:
  name: cluster-default
spec:
  protectControlPlane: true
  controlPlaneNodeLabels:
    - node-role.kubernetes.io/control-plane
    - node-role.kubernetes.io/master
  maxConcurrentDrains: 1
  # Peak simultaneous unavailability cap. The preflight evaluates this against the
  # per-batch concurrency for requests that uncordon, so a one-at-a-time rolling
  # drain of a whole pool is not blocked. Set 100 to effectively disable.
  maxUnavailablePercent: 33
  minCapacityHeadroomPercent: 15
  allowForceEviction: false
  # Permit node replacement (spec.upgrade): drained nodes have their backing
  # Machine deleted so the pool recreates them at the pool's version. Destructive,
  # so it is opt-in; set false to forbid replacement under this policy.
  allowNodeReplacement: true
  defaultApprovalPolicy: AutoApprove
  failureThreshold: 1
  # No allowedWindows => maintenance is permitted at any time unless a request
  # defines its own maintenanceWindow.

